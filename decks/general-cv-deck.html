<!DOCTYPE html>
<html lang="fi"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Tapio Pitkäranta — General CV (slide deck)</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;display:flex;align-items:center;justify-content:center}
.box{background:#1e293b;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,.4);padding:48px;max-width:420px;width:90%;text-align:center}
.icon{font-size:48px;margin-bottom:16px}
.title{font-size:22px;font-weight:600;margin-bottom:24px}
.field{position:relative;margin-bottom:16px}
input{width:100%;padding:14px 48px 14px 16px;border:2px solid #334155;background:#0f172a;color:#e2e8f0;border-radius:12px;font-size:16px;outline:none}
input:focus{border-color:#3b82f6}
.eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#64748b;font-size:18px}
.go{width:100%;padding:14px;background:#3b82f6;color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer}
.go:hover{background:#2563eb}.go:disabled{background:#475569;cursor:not-allowed}
.err{color:#ef4444;font-size:13px;margin-top:12px;display:none}
.spin{display:inline-block;width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:s .6s linear infinite;vertical-align:middle;margin-right:8px}
@keyframes s{to{transform:rotate(360deg)}}
</style>
</head><body>
<div class="box" id="boxLogin" style="display:none">
  <div class="icon">🔒</div>
  <div class="title">CV — kirjaudu sisään</div>
  <form id="f">
    <div class="field">
      <input type="password" id="pw" placeholder="Salasana" autocomplete="off" autofocus>
      <button type="button" class="eye" id="eye">👁</button>
    </div>
    <button type="submit" class="go" id="go">Avaa CV</button>
  </form>
  <div class="err" id="err">Väärä salasana. Yritä uudelleen.</div>
</div>
<div class="box" id="boxAuto" style="display:none">
  <div class="icon">🔓</div>
  <div class="title">Puretaan…</div>
  <div><span class="spin"></span></div>
</div>

function decryptWith(pwd){
  var t=new TextEncoder();
  return crypto.subtle.importKey("raw",t.encode(pwd),"PBKDF2",false,["deriveKey"])
    .then(function(km){return crypto.subtle.deriveKey({name:"PBKDF2",salt:b(S),iterations:600000,hash:"SHA-256"},km,{name:"AES-GCM",length:256},false,["decrypt"])})

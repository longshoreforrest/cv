function decryptWith(pwd){
  var t=new TextEncoder();
  return crypto.subtle.importKey("raw",t.encode(pwd),"PBKDF2",false,["deriveKey"])
    .then(function(km){return crypto.subtle.deriveKey({name:"PBKDF2",salt:b(S),iterations:600000,hash:"SHA-256"},km,{name:"AES-GCM",length:256},false,["decrypt"])})

    .then(function(buf){return new TextDecoder().decode(buf)});
}

<script>
/*!
 * MyPublicAnalytics beacon — selainpuolen snippet.
 * Käyttöohjeet README.md:ssä (osa "Beaconin lisääminen sivustoon").
 *
 * Lähetys:
 *   - 'pageview' automaattisesti sivun latautuessa
 *   - Custom-eventit: window.mypa.send('section_view', { section: 'experience' })
 *
 * Käyttää navigator.sendBeacon() (eloonjäänti sivu-vaihdoksen yli) ja
 * fetch keepalive:n fallbackia.
 */
(function () {
  if (typeof window === "undefined") return;
  if (window.mypa && window.mypa.__initialized) return;

  var SITE = window.__MYPA_SITE__ || "unknown";
  var ENDPOINT = window.__MYPA_ENDPOINT__ || "";
  var AUTO_EVENT = window.__MYPA_AUTO_EVENT__ || "pageview";

  if (!ENDPOINT) {
    // Configuroimaton beacon → ei lähetetä mitään, ei roskaa konsoliin.
    return;
  }

  function utm() {
    try {
      var p = new URLSearchParams(window.location.search);
      return {
        source: p.get("utm_source") || null,
        medium: p.get("utm_medium") || null,
        campaign: p.get("utm_campaign") || null,
      };
    } catch (e) {
      return { source: null, medium: null, campaign: null };
    }
  }

  function send(event, extra) {
    try {
      var body = JSON.stringify({
        site: SITE,
        path: window.location.pathname + window.location.search,
        event: event || "pageview",
        referrer: document.referrer || "",
        utm: utm(),
        extra: extra || null,
      });
      // Lähetä text/plain:nä — CORS-safelisted MIME, ei preflightia.
      // Worker parsii body:n JSONina sisällöstä huolimatta.
      if (
        navigator.sendBeacon &&
        navigator.sendBeacon(
          ENDPOINT,
          new Blob([body], { type: "text/plain;charset=UTF-8" }),
        )
      ) {
        return;
      }
      // Fallback: fetch with keepalive (myös text/plain → simple CORS)
      fetch(ENDPOINT, {
        method: "POST",
        headers: { "content-type": "text/plain;charset=UTF-8" },
        body: body,
        keepalive: true,
        mode: "cors",
        credentials: "omit",
      }).catch(function () {});
    } catch (e) {
      // Älä koskaan kaada sivua analytiikan takia.
    }
  }

  // Automaattinen pageview (tai override window.__MYPA_AUTO_EVENT__:llä)
  if (document.readyState === "complete" || document.readyState === "interactive") {
    send(AUTO_EVENT);
  } else {
    document.addEventListener("DOMContentLoaded", function () {
      send(AUTO_EVENT);
    });
  }

  window.mypa = { send: send, __initialized: true };
})();

</script>
